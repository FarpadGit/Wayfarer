<div class="app-wrapper" [class.blur]="blur">
  @if(isEntering) {
    <div class="backdrop-image" animate.enter="enter"></div>
  }
  <app-background />
  <div class="app-container" [class.quickEntering]="animationState === 'quickEntering'">
    <app-login-button class="login-btn" [ngClass]="animationState"></app-login-button>
    <router-outlet></router-outlet>
  </div>
</div>
