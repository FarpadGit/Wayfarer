<div class="background-image" 
    [class.full]="onPostPage"
    [class.blur]="blur"
    [ngClass]="animationState"
    (animationend)="handleAnimationEnd()"
  >
  <img
    [ngSrc]="'/assets/bgs/' + backgroundImage"
    fill
    priority
    alt=""
    (load)="onImgLoad()"
    [ngClass]="{ 'hide': !onPostPage }"
  />
  <div
    id="Logo"
    [ngClass]="animationState"
  >
    Wayfarer
  </div>
</div>
